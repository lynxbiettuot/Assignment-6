<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Detail</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #007bff; color: white; }
        .header h1 { margin: 0; color: #333; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; margin-top: 50px;}
        .book-title { font-size: 28px; font-weight: bold; margin: 0 0 10px 0; color: #007bff; }
        .book-author { color: #555; margin-bottom: 20px; font-size: 18px; }
        .book-detail { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; cursor: pointer; border: none; font-size: 16px; transition: background-color 0.2s;}
        .btn:hover { background: #5a6268; }
        .btn-primary { background: #007bff; }
        .btn-primary:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BookStore Dashboard</h1>
        <div class="nav-links">
            <a href="/dashboard/">Dashboard</a>
            <a href="/view-books/">View Books</a>
            <a href="/add-book/">Add Book</a>
            <a href="/cart/">Cart</a>
        </div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <div class="container" id="book-content">
        <h2>Loading book details...</h2>
    </div>

    <!-- Edit Form (Hidden by default) -->
    <div id="edit-form-container" class="container" style="display: none; margin-top: 20px;">
        <h2>Edit Book</h2>
        <div id="edit-error-msg" style="color: red; margin-bottom: 15px; display: none;"></div>
        <form id="edit-book-form">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">New Book Image (Optional)</label>
                <input type="file" id="edit-image" accept="image/*" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Title</label>
                <input type="text" id="edit-title" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Author</label>
                <input type="text" id="edit-author" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Price ($)</label>
                <input type="number" id="edit-price" step="0.01" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="button" class="btn" onclick="toggleEdit(false)">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/login/';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/login/';
        });

        const bookId = {{ book_id }};
        let currentBookData = null;

        async function fetchBookDetail() {
            try {
                // Fetch specific book detail via catalog-service
                const res = await fetch(`/api/catalog/catalog/books/${bookId}/`);
                if (res.ok) {
                    const book = await res.json();
                    currentBookData = book;
                    renderBookDetail(book);
                } else {
                    document.getElementById('book-content').innerHTML = `<h2>Book not found</h2><a href="/view-books/" class="btn">Back</a>`;
                }
            } catch (error) {
                console.error("Failed to load book:", error);
                document.getElementById('book-content').innerHTML = `<h2>Error loading book details</h2><a href="/view-books/" class="btn">Back</a>`;
            }
        }

        function renderBookDetail(book) {
            const container = document.getElementById('book-content');
            const imageUrl = book.image ? `/api/books${book.image}` : 'https://via.placeholder.com/600x400?text=No+Image';
            
            container.innerHTML = `
                <img src="${imageUrl}" style="width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 20px; border-radius: 10px;">
                <h1 class="book-title">${book.title}</h1>
                <div class="book-author">Author: ${book.author}</div>
                <div class="book-detail"><strong>Price:</strong> $${book.price}</div>
                <div class="book-detail"><strong>Stock Available:</strong> ${book.stock} units</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 30px;">
                    <button class="btn btn-primary" onclick="addToCart(bookId)">Add to Cart</button>
                    <button class="btn" style="background-color: #ffc107; color: #000;" onclick="toggleEdit(true)">Edit Book</button>
                    <a href="/view-books/" class="btn">Back to Books</a>
                </div>
            `;
        }

        
        function toggleEdit(show) {
            const content = document.getElementById('book-content');
            const editForm = document.getElementById('edit-form-container');
            
            if (show) {
                content.style.display = 'none';
                editForm.style.display = 'block';
                
                // Pre-populate form
                document.getElementById('edit-title').value = currentBookData.title;
                document.getElementById('edit-author').value = currentBookData.author;
                document.getElementById('edit-price').value = currentBookData.price;
            } else {
                content.style.display = 'block';
                editForm.style.display = 'none';
            }
        }

        document.getElementById('edit-book-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('edit-title').value);
            formData.append('author', document.getElementById('edit-author').value);
            formData.append('price', document.getElementById('edit-price').value);
            
            const imageFile = document.getElementById('edit-image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const res = await fetch(`/api/books/books/${bookId}/`, {
                    method: 'PUT',
                    body: formData
                });

                if (res.ok) {
                    alert('Book updated successfully!');
                    location.reload();
                } else {
                    const data = await res.json();
                    const errorMsg = document.getElementById('edit-error-msg');
                    errorMsg.textContent = "Update failed: " + JSON.stringify(data);
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error("Update error:", error);
                alert("Network error trying to update book.");
            }
        });

        // Extremely basic JWT decode to get user ID
        function parseJwt (token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return null; }
        }

        async function addToCart(bId) {
            const token = localStorage.getItem('access_token');
            const payload = parseJwt(token);
            const userId = payload ? payload.user_id : 1; 

            try {
                // 1. Get or Create Cart for this user
                console.log("Getting/Creating cart for user:", userId);
                const cartRes = await fetch('/api/cart/carts/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: userId })
                });

                if (!cartRes.ok) {
                    const errorData = await cartRes.json();
                    throw new Error("Failed to initialize cart: " + JSON.stringify(errorData));
                }

                const cartData = await cartRes.json();
                const cartPk = cartData.id;
                console.log("Using cart PK:", cartPk);

                // 2. Add Item to this specific cart
                const itemRes = await fetch('/api/cart/cart-items/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cart: cartPk,
                        book_id: bId,
                        quantity: 1
                    })
                });

                if (itemRes.ok) {
                    alert('Successfully added to cart!');
                    window.location.href = '/cart/';
                } else {
                    const itemError = await itemRes.json();
                    alert('Failed to add to cart: ' + JSON.stringify(itemError));
                }
            } catch (err) {
                console.error("Cart error:", err);
                alert("Error handling cart: " + err.message);
            }
        }

        fetchBookDetail();
    </script>
</body>
</html>
