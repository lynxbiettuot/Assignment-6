<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sách – Khách hàng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #007bff; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; margin-top: 50px;}
        .book-title { font-size: 28px; font-weight: bold; margin: 0 0 10px 0; color: #007bff; }
        .book-author { color: #555; margin-bottom: 20px; font-size: 18px; }
        .book-detail { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; cursor: pointer; border: none; font-size: 16px; transition: background-color 0.2s;}
        .btn:hover { background: #5a6268; }
        .btn-primary { background: #007bff; }
        .btn-primary:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span></h1>
        <div class="nav-links">
            <a href="/customer/dashboard/">Dashboard</a>
            <a href="/customer/view-books/">View Books</a>
            <a href="/customer/cart/">Cart</a>
            <a href="/customer/shipping-list/">Shipping Orders</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container" id="book-content">
        <h2>Đang tải chi tiết sách...</h2>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/customer/login/';
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/customer/login/';
        }

        const bookId = {{ book_id }};

        async function fetchBookDetail() {
            try {
                const res = await fetch(`/api/catalog/catalog/books/${bookId}/`);
                if (res.ok) {
                    const book = await res.json();
                    renderBookDetail(book);
                } else {
                    document.getElementById('book-content').innerHTML = `<h2>Không tìm thấy sách</h2><a href="/customer/view-books/" class="btn">Quay lại</a>`;
                }
            } catch (error) {
                console.error("Failed to load book:", error);
                document.getElementById('book-content').innerHTML = `<h2>Lỗi khi tải chi tiết sách</h2><a href="/customer/view-books/" class="btn">Quay lại</a>`;
            }
        }

        function renderBookDetail(book) {
            const container = document.getElementById('book-content');
            const imageUrl = book.image ? `/api/books${book.image}` : 'https://via.placeholder.com/600x400?text=No+Image';
            
            container.innerHTML = `
                <img src="${imageUrl}" style="width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 20px; border-radius: 10px;">
                <h1 class="book-title">${book.title}</h1>
                <div class="book-author">Tác giả: ${book.author}</div>
                <div class="book-detail"><strong>Giá:</strong> $${book.price}</div>
                <div class="book-detail"><strong>Trạng thái:</strong> Còn hàng</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 30px;">
                    <button class="btn btn-primary" onclick="addToCart(${book.id})">Thêm vào giỏ hàng</button>
                    <a href="/customer/view-books/" class="btn">Quay lại danh sách</a>
                </div>
            `;
        }

        function parseJwt (token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return null; }
        }

        async function addToCart(bId) {
            const payload = parseJwt(token);
            const userId = payload ? payload.user_id : null;
            if(!userId) return alert("Vui lòng đăng nhập lại.");

            try {
                // 1. Khởi tạo giỏ hàng
                const cartRes = await fetch('/api/cart/carts/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: userId })
                });

                if (!cartRes.ok) throw new Error("Không thể khởi tạo giỏ hàng.");

                const cartData = await cartRes.json();
                const cartPk = cartData.id;

                // 2. Thêm sách vào giỏ
                const itemRes = await fetch('/api/cart/cart-items/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cart: cartPk,
                        book_id: bId,
                        quantity: 1
                    })
                });

                if (itemRes.ok) {
                    alert('Đã thêm vào giỏ hàng thành công!');
                    window.location.href = '/customer/cart/';
                } else {
                    const error = await itemRes.json();
                    alert('Lỗi: ' + JSON.stringify(error));
                }
            } catch (err) {
                console.error(err);
                alert("Lỗi khi xử lý giỏ hàng: " + err.message);
            }
        }

        fetchBookDetail();
    </script>
</body>
</html>
