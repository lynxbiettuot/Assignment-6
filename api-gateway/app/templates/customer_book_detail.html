<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sách – Khách hàng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #007bff; }
        .version-tag { font-size: 10px; color: #ccc; background: #eee; padding: 2px 5px; border-radius: 3px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; margin-top: 50px;}
        .book-title { font-size: 28px; font-weight: bold; margin: 0 0 10px 0; color: #007bff; }
        .book-author { color: #555; margin-bottom: 20px; font-size: 18px; }
        .book-detail { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; cursor: pointer; border: none; font-size: 16px; transition: background-color 0.2s;}
        .btn:hover { background: #5a6268; }
        .btn-primary { background: #007bff; }
        .btn-primary:hover { background: #0056b3; }

        /* Rating styles */
        .rating-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .rating-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #007bff; }
        .rating-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        .rating-stars { color: #ffc107; }
        .rating-comment { font-style: italic; color: #444; }
        .rating-form { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 10px; margin-top: 20px; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .comment-list { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span> <span class="version-tag">v1.2</span></h1>
        <div class="nav-links">
            <a href="/customer/dashboard/">Dashboard</a>
            <a href="/customer/view-books/">View Books</a>
            <a href="/customer/cart/">Cart</a>
            <a href="/customer/shipping-list/">Shipping Orders</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container" id="book-content">
        <h2>Đang tải chi tiết sách...</h2>
    </div>

    <!-- Rating Section moved OUTSIDE book-content to prevent overwriting -->
    <div class="container" style="max-width: 600px; margin-top: 20px;">
        <div class="rating-section">
            <h3 style="margin-top: 0;">Đánh giá và Bình luận</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="showRatingForm()">Tạo đánh giá</button>
                <button class="btn" onclick="fetchRatings()">Xem các đánh giá</button>
            </div>

            <!-- Form đánh giá -->
            <div id="rating-form" class="rating-form">
                <h4>Viết đánh giá của bạn</h4>
                <div class="form-group">
                    <label for="rating-value">Số sao:</label>
                    <select id="rating-value">
                        <option value="5">5 Sao - Rất tuyệt</option>
                        <option value="4">4 Sao - Tốt</option>
                        <option value="3">3 Sao - Bình thường</option>
                        <option value="2">2 Sao - Kém</option>
                        <option value="1">1 Sao - Rất tệ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rating-comment">Bình luận (tối đa 200 từ):</label>
                    <textarea id="rating-comment" rows="4" placeholder="Nhập bình luận của bạn tại đây..."></textarea>
                    <div id="word-count" style="font-size: 12px; color: #888; margin-top: 5px;">Từ: 0/200</div>
                </div>
                <button class="btn btn-primary" onclick="submitRating()">Gửi đánh giá</button>
                <button class="btn" onclick="hideRatingForm()">Hủy</button>
            </div>

            <!-- Danh sách comment -->
            <div id="comment-list" class="comment-list">
                <!-- Comments will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/customer/login/';
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/customer/login/';
        }

        const bookId = {{ book_id }};

        async function fetchBookDetail() {
            try {
                const res = await fetch(`/api/catalog/catalog/books/${bookId}/`);
                if (res.ok) {
                    const book = await res.json();
                    renderBookDetail(book);
                } else {
                    document.getElementById('book-content').innerHTML = `<h2>Không tìm thấy sách</h2><a href="/customer/view-books/" class="btn">Quay lại</a>`;
                }
            } catch (error) {
                console.error("Failed to load book:", error);
                document.getElementById('book-content').innerHTML = `<h2>Lỗi khi tải chi tiết sách</h2><a href="/customer/view-books/" class="btn">Quay lại</a>`;
            }
        }

        function renderBookDetail(book) {
            const container = document.getElementById('book-content');
            const imageUrl = book.image ? `/api/books${book.image}` : 'https://via.placeholder.com/600x400?text=No+Image';
            
            container.innerHTML = `
                <img src="${imageUrl}" style="width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 20px; border-radius: 10px;">
                <h1 class="book-title">${book.title}</h1>
                <div class="book-author">Tác giả: ${book.author}</div>
                <div class="book-detail"><strong>Giá:</strong> $${book.price}</div>
                <div class="book-detail"><strong>Trạng thái:</strong> Còn hàng</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 30px;">
                    <button class="btn btn-primary" onclick="addToCart(${book.id})">Thêm vào giỏ hàng</button>
                    <a href="/customer/view-books/" class="btn">Quay lại danh sách</a>
                </div>
            `;
        }

        function parseJwt (token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return null; }
        }

        async function addToCart(bId) {
            const payload = parseJwt(token);
            const userId = payload ? payload.user_id : null;
            if(!userId) return alert("Vui lòng đăng nhập lại.");

            try {
                // 1. Khởi tạo giỏ hàng
                const cartRes = await fetch('/api/cart/carts/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: userId })
                });

                if (!cartRes.ok) throw new Error("Không thể khởi tạo giỏ hàng.");

                const cartData = await cartRes.json();
                const cartPk = cartData.id;

                // 2. Thêm sách vào giỏ
                const itemRes = await fetch('/api/cart/cart-items/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cart: cartPk,
                        book_id: bId,
                        quantity: 1
                    })
                });

                if (itemRes.ok) {
                    alert('Đã thêm vào giỏ hàng thành công!');
                    window.location.href = '/customer/cart/';
                } else {
                    const error = await itemRes.json();
                    alert('Lỗi: ' + JSON.stringify(error));
                }
            } catch (err) {
                console.error(err);
                alert("Lỗi khi xử lý giỏ hàng: " + err.message);
            }
        }

        fetchBookDetail();

        function showRatingForm() {
            document.getElementById('rating-form').style.display = 'block';
        }

        function hideRatingForm() {
            document.getElementById('rating-form').style.display = 'none';
        }

        async function fetchRatings() {
            const commentList = document.getElementById('comment-list');
            commentList.innerHTML = '<p>Đang tải bình luận...</p>';
            
            try {
                const res = await fetch(`/api/comment-rate/ratings/?book_id=${bookId}`);
                if (res.ok) {
                    const ratings = await res.json();
                    renderRatings(ratings);
                } else {
                    commentList.innerHTML = '<p>Chưa có bình luận nào hoặc lỗi khi tải.</p>';
                }
            } catch (error) {
                console.error("Failed to load ratings:", error);
                commentList.innerHTML = '<p>Lỗi kết nối khi tải bình luận.</p>';
            }
        }

        function renderRatings(ratings) {
            const commentList = document.getElementById('comment-list');
            if (ratings.length === 0) {
                commentList.innerHTML = '<p>Chưa có bình luận nào cho sản phẩm này.</p>';
                return;
            }

            commentList.innerHTML = ratings.map(r => `
                <div class="rating-item">
                    <div class="rating-header">
                        <span>${r.user_name}</span>
                        <span class="rating-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                    </div>
                    <div class="rating-comment">${r.comment}</div>
                    <div style="font-size: 12px; color: #888; margin-top: 5px;">
                        ${new Date(r.created_at).toLocaleString('vi-VN')}
                    </div>
                </div>
            `).join('');
        }

        async function submitRating() {
            const ratingValue = document.getElementById('rating-value').value;
            const commentText = document.getElementById('rating-comment').value;
            
            // Đếm số từ
            const wordCount = commentText.trim().split(/\s+/).filter(w => w.length > 0).length;
            if (wordCount > 200) {
                alert("Bình luận không được vượt quá 200 từ.");
                return;
            }

            if (!commentText.trim()) {
                alert("Vui lòng nhập bình luận.");
                return;
            }

            const payload = parseJwt(token);
            const userId = payload ? payload.user_id : null;
            const userName = payload ? payload.username : "Khách";

            if (!userId) {
                alert("Bạn cần đăng nhập để đánh giá.");
                return;
            }

            try {
                const res = await fetch('/api/comment-rate/ratings/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        book_id: bookId,
                        user_id: userId,
                        user_name: userName,
                        rating: parseInt(ratingValue),
                        comment: commentText
                    })
                });

                if (res.ok) {
                    alert("Gửi đánh giá thành công!");
                    document.getElementById('rating-comment').value = '';
                    hideRatingForm();
                    fetchRatings(); // Reload comment list
                } else {
                    const err = await res.json();
                    alert("Lỗi khi gửi đánh giá: " + JSON.stringify(err));
                }
            } catch (error) {
                console.error("Failed to submit rating:", error);
                alert("Lỗi kết nối khi gửi đánh giá.");
            }
        }

        // Theo dõi số từ
        document.getElementById('rating-comment').addEventListener('input', function() {
            const text = this.value;
            const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const display = document.getElementById('word-count');
            display.innerText = `Từ: ${wordCount}/200`;
            if (wordCount > 200) {
                display.style.color = 'red';
            } else {
                display.style.color = '#888';
            }
        });
    </script>
</body>
</html>
