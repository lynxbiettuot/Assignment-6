<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - BookStore</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #2c3e50; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #2c3e50; color: white; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #2c3e50; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .welcome { margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #2c3e50; }
        .stat-card h3 { font-size: 16px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 42px; font-weight: bold; color: #2c3e50; }
        .stat-card.staff { border-color: #3498db; }
        .stat-card.customer { border-color: #9b59b6; }
        .stat-card.revenue { border-color: #27ae60; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span> [Manager]</h1>
        <div class="nav-links">
            <a href="/manager/dashboard/" class="active">Dashboard</a>
            <a href="/manager/view-books/">View Books</a>
            <a href="/manager/staff/">Manage Staff</a>
            <a href="/manager/customers/">Manage Customers</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="welcome">
        <h2>Xin chào, <span id="username-display">Quản lý</span>!</h2>
        <p>Bảng điều khiển tổng quan hệ thống.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Tổng số đầu sách</h3>
            <div class="value" id="total-books">0</div>
        </div>
        <div class="stat-card staff">
            <h3>Tài khoản Staff</h3>
            <div class="value" id="total-staff">0</div>
        </div>
        <div class="stat-card customer">
            <h3>Tài khoản Customer</h3>
            <div class="value" id="total-customers">0</div>
        </div>
        <div class="stat-card revenue">
            <h3>Tổng doanh thu (VNĐ)</h3>
            <div class="value" id="total-revenue">0</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/manager/login/';
        
        document.getElementById('username-display').textContent = localStorage.getItem('username') || 'Quản lý';

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/manager/api/dashboard-data/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Unauthorized");
                const data = await res.json();
                
                document.getElementById('total-books').textContent = data.total_books;
                document.getElementById('total-staff').textContent = data.total_staff;
                document.getElementById('total-customers').textContent = data.total_customers;
                document.getElementById('total-revenue').textContent = data.total_revenue.toLocaleString('vi-VN');
            } catch(e) { 
                console.error(e);
                window.location.href = '/manager/login/';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/manager/login/';
        }

        loadDashboardData();
    </script>
</body>
</html>
