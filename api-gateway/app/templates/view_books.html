<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Books</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #007bff; color: white; }
        .header h1 { margin: 0; color: #333; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .book-card { background: white; padding: 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; }
        .book-card:hover { transform: translateY(-5px); }
        .book-image { width: 100%; height: 200px; object-fit: cover; background-color: #eee; }
        .book-info { padding: 15px; }
        .book-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; color: #007bff; }
        .book-author { color: #555; margin-bottom: 5px; }
        .book-price { font-weight: bold; color: #28a745; margin-bottom: 10px; }
        .pagination { display: flex; justify-content: center; margin-top: 30px; gap: 10px; }
        .page-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; }
        .page-btn:hover { background: #f0f0f0; }
        .page-btn:disabled { background: #eee; cursor: not-allowed; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BookStore Dashboard</h1>
        <div class="nav-links">
            <a href="/dashboard/">Dashboard</a>
            <a href="/view-books/" class="active">View Books</a>
            <a href="/add-book/">Add Book</a>
            <a href="/cart/">Cart</a>
            <a href="/shipping-list/">Shipping Orders</a>
        </div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <div id="books-container" class="book-grid">
        <!-- Books will be loaded here via JS -->
    </div>

    <div class="pagination">
        <button id="prev-btn" class="page-btn">Previous</button>
        <span id="page-info" style="line-height: 35px; font-weight: bold;">Page 1</span>
        <button id="next-btn" class="page-btn">Next</button>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/login/';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/login/';
        });

        // Pagination state
        let currentPage = 1;
        let allBooks = [];
        let totalBooksCount = 0;
        let hasNextPage = false;
        let hasPrevPage = false;

        async function fetchBooks() {
            try {
                // Hitting catalog-service via API Gateway
                // Catalog service returns: { count, next, previous, results: [...] }
                const res = await fetch(`/api/catalog/catalog/books/?page=${currentPage}`);
                if (res.ok) {
                    const data = await res.json();
                    
                    // Update state based on DRF paginated response
                    allBooks = data.results;
                    totalBooksCount = data.count;
                    hasNextPage = data.next !== null;
                    hasPrevPage = data.previous !== null;
                    
                    renderBooks();
                }
            } catch (error) {
                console.error("Failed to load books:", error);
            }
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            container.innerHTML = '';

            // paginatedBooks is now exactly what the server returned for this page
            const paginatedBooks = allBooks;

            paginatedBooks.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                // Adjust image URL if it comes from the book-service
                // Image path from backend is likely /media/book_images/filename.jpg
                // We proxy it via /api/books/media/...
                const imageUrl = book.image ? `/api/books${book.image}` : 'https://via.placeholder.com/250x200?text=No+Image';
                
                card.innerHTML = `
                    <img src="${imageUrl}" class="book-image" alt="${book.title}">
                    <div class="book-info">
                        <h3 class="book-title">${book.title}</h3>
                        <div class="book-author">By: ${book.author}</div>
                        <div class="book-price">$${book.price}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = `/books/${book.id}/`;
                });
                container.appendChild(card);
            });

            // Update pagination controls
            const totalPages = Math.ceil(totalBooksCount / 10); // page_size is 10 in StandardResultsSetPagination
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages || 1}`;
            document.getElementById('prev-btn').disabled = !hasPrevPage;
            document.getElementById('next-btn').disabled = !hasNextPage;
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (hasPrevPage) {
                currentPage--;
                fetchBooks();
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (hasNextPage) {
                currentPage++;
                fetchBooks();
            }
        });

        // Initial load
        fetchBooks();
    </script>
</body>
</html>
