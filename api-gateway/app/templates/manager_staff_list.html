<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Manage Staff - BookStore Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #2c3e50; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #2c3e50; color: white; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #2c3e50; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .action-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; color: white; font-weight: bold; }
        .btn-add { background-color: #27ae60; }
        .btn-edit { background-color: #f39c12; margin-right: 5px; }
        .btn-delete { background-color: #e74c3c; }
        .btn-cancel { background-color: #95a5a6; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span> [Manager]</h1>
        <div class="nav-links">
            <a href="/manager/dashboard/">Dashboard</a>
            <a href="/manager/view-books/">View Books</a>
            <a href="/manager/staff/" class="active">Manage Staff</a>
            <a href="/manager/customers/">Manage Customers</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <div class="action-bar">
            <h2>Danh sách Staff</h2>
            <button class="btn btn-add" onclick="openModal()">+ Thêm Staff</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="staff-table-body">
                <!-- Data populated here -->
            </tbody>
        </table>
    </div>

    <div class="modal" id="staff-modal">
        <div class="modal-content">
            <h3 id="modal-title">Thêm Staff</h3>
            <form id="staff-form">
                <input type="hidden" id="staff-id">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>Password (Để trống nếu không đổi)</label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address">
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-add">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/manager/login/';

        async function loadStaff() {
            const res = await fetch('/api/manager/api/staff/', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401 || res.status === 403) {
                window.location.href = '/manager/login/';
                return;
            }
            const data = await res.json();
            const tbody = document.getElementById('staff-table-body');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Không có dữ liệu</td></tr>';
                return;
            }

            data.forEach(staff => {
                const tr = document.createElement('tr');
                const staffJson = JSON.stringify(staff).replace(/'/g, "\\'");
                tr.innerHTML = `
                    <td>${staff.id}</td>
                    <td>${staff.username}</td>
                    <td>${staff.email || ''}</td>
                    <td>${staff.phone || ''}</td>
                    <td>${staff.address || ''}</td>
                    <td>
                        <button class="btn btn-edit" onclick='openModal(${staffJson})'>Sửa</button>
                        <button class="btn btn-delete" onclick="deleteStaff(${staff.id})">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(staff = null) {
            document.getElementById('staff-modal').style.display = 'flex';
            if (staff) {
                document.getElementById('modal-title').textContent = 'Sửa Staff';
                document.getElementById('staff-id').value = staff.id;
                document.getElementById('username').value = staff.username;
                document.getElementById('email').value = staff.email || '';
                document.getElementById('phone').value = staff.phone || '';
                document.getElementById('address').value = staff.address || '';
                document.getElementById('password').value = '';
                document.getElementById('password').removeAttribute('required');
            } else {
                document.getElementById('modal-title').textContent = 'Thêm Staff';
                document.getElementById('staff-form').reset();
                document.getElementById('staff-id').value = '';
                document.getElementById('password').setAttribute('required', 'required');
            }
        }

        function closeModal() {
            document.getElementById('staff-modal').style.display = 'none';
        }

        document.getElementById('staff-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('staff-id').value;
            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            const pwd = document.getElementById('password').value;
            if (pwd) payload.password = pwd;

            const url = id ? `/api/manager/api/staff/${id}/` : '/api/manager/api/staff/';
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeModal();
                loadStaff();
            } else {
                alert("Lỗi khi lưu dữ liệu!");
            }
        });

        async function deleteStaff(id) {
            if (confirm('Bạn có chắc chắn muốn xóa staff này?')) {
                const res = await fetch(`/api/manager/api/staff/${id}/`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadStaff();
                } else {
                    alert("Lỗi khi xóa!");
                }
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/manager/login/';
        }

        loadStaff();
    </script>
</body>
</html>
