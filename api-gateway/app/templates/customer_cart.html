<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn – Khách hàng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #007bff; color: white; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #007bff; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 800px; margin: 0 auto; }
        h2 { color: #333; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .total-row { font-weight: bold; font-size: 18px; }
        .checkout-btn { display: block; width: 100%; text-align: center; padding: 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; margin-top: 30px; font-size: 18px; font-weight: bold; transition: background 0.2s; }
        .checkout-btn:hover { background: #218838; }
        .empty-cart { text-align: center; color: #777; padding: 40px; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span></h1>
        <div class="nav-links">
            <a href="/customer/dashboard/">Dashboard</a>
            <a href="/customer/view-books/">View Books</a>
            <a href="/customer/cart/" class="active">Cart</a>
            <a href="/customer/shipping-list/">Shipping Orders</a>
            <a href="/customer/favorites/">⭐ Sản phẩm ưa thích</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h2>Giỏ hàng của bạn</h2>
        <div id="cart-content">
            <div class="empty-cart">Đang tải giỏ hàng...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/customer/login/';

        function logout() { localStorage.clear(); window.location.href = '/customer/login/'; }

        async function loadCart() {
            try {
                // 1. Lấy thông tin sách để map title/price (Catalog là public)
                let books = [];
                try {
                    const bookRes = await fetch('/api/catalog/catalog/books/');
                    if (bookRes.ok) {
                        const data = await bookRes.json();
                        books = data.results || [];
                    }
                } catch (e) { console.warn("Could not load books:", e); }

                const container = document.getElementById('cart-content');

                // 2. Fetch qua proxy customer-service (tự động filter user_id)
                const cartRes = await fetch('/api/customer/api/cart/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!cartRes.ok) {
                    container.innerHTML = '<div class="empty-cart">Lỗi khi tải giỏ hàng.</div>';
                    return;
                }

                const cartItems = await cartRes.json();

                if (!cartItems || cartItems.length === 0) {
                    container.innerHTML = '<div class="empty-cart">Giỏ hàng đang trống.</div>';
                    return;
                }

                let tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>Sách</th>
                                <th>Số lượng</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                let grandTotal = 0;
                cartItems.forEach(item => {
                    const book = books.find(b => b.id === item.book_id) || { title: `Sách #${item.book_id}`, price: 0 };
                    const price = parseFloat(book.price) || 0;
                    const subtotal = price * item.quantity;
                    grandTotal += subtotal;

                    tableHtml += `
                        <tr>
                            <td>${book.title}</td>
                            <td>${item.quantity}</td>
                            <td>$${price.toFixed(2)}</td>
                            <td>$${subtotal.toFixed(2)}</td>
                        </tr>
                    `;
                });

                tableHtml += `
                        <tr class="total-row">
                            <td colspan="3" style="text-align: right;">Tổng cộng:</td>
                            <td>$${grandTotal.toFixed(2)}</td>
                        </tr>
                        </tbody>
                    </table>
                    <a href="/customer/checkout/" class="checkout-btn">Tiến hành thanh toán</a>
                `;
                container.innerHTML = tableHtml;

            } catch (error) {
                console.error(error);
                document.getElementById('cart-content').innerHTML = '<div class="empty-cart">Đã có lỗi xảy ra.</div>';
            }
        }

        loadCart();
    </script>
</body>
</html>
