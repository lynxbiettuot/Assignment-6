<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shipping Orders</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        h1 { color: #333; margin-top: 0;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px;}
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f0f0f0; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 14px; }
        .status-processing { background-color: #cce5ff; color: #004085; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; background-color: #dc3545; font-weight: bold;}
        .action-btn:hover { background-color: #c82333; }
        .view-btn { background-color: #17a2b8; }
        .view-btn:hover { background-color: #138496; }
        .no-data { text-align: center; color: #777; font-style: italic; padding: 20px;}
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 600px; border-radius: 10px; position: relative;}
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover, .close-btn:focus { color: black; text-decoration: none; }
        .order-detail-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;}
    </style>
</head>
<body>
    <div class="header">
        <h1>BookStore Dashboard</h1>
        <div class="nav-links">
            <a href="/dashboard/">Dashboard</a>
            <a href="/view-books/">View Books</a>
            <a href="/add-book/">Add Book</a>
            <a href="/cart/">Cart</a>
            <a href="/shipping-list/" class="active">Shipping Orders</a>
        </div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <div class="container">
        <h1>Active Shipping Orders</h1>
        <table id="shipping-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Order #</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="shipping-tbody">
                <tr><td colspan="5" class="no-data">Loading shipments...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- The Modal -->
    <div id="orderModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>Order Details <span id="modal-order-id"></span></h2>
        <div id="modal-body">
            Loading...
        </div>
      </div>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/login/';
        }

        let booksMap = {};

        async function fetchBooksMap() {
            try {
                // Fetch books to show names in order details
                const res = await fetch('/api/books/books/');
                if (res.ok) {
                    const books = await res.json();
                    books.forEach(b => { booksMap[b.id] = b.title; });
                }
            } catch (err) {
                console.error("Could not fetch books for mapping", err);
            }
        }

        async function fetchShippingList() {
            try {
                const res = await fetch('/api/ship/shipping/all/');
                const data = await res.json();
                
                const tbody = document.getElementById('shipping-tbody');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No active shipments found.</td></tr>';
                    return;
                }

                let html = '';
                data.forEach(ship => {
                    html += `
                        <tr>
                            <td>${ship.id}</td>
                            <td>${ship.order_id}</td>
                            <td>${ship.address}</td>
                            <td><span class="status-badge status-processing">${ship.status}</span></td>
                            <td>
                                <button class="action-btn view-btn" onclick="viewOrderDetails(${ship.order_id})">View Details</button>
                                <button class="action-btn" onclick="completeShipping(${ship.id})">Mark Completed</button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('shipping-tbody').innerHTML = '<tr><td colspan="5" class="no-data" style="color:red;">Error loading shipping records.</td></tr>';
            }
        }

        async function completeShipping(shipId) {
            if (!confirm("Are you sure you want to delete this shipping record?")) return;
            try {
                const res = await fetch(`/api/ship/shipping/delete/${shipId}/`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    fetchShippingList(); // Refresh
                } else {
                    alert('Failed to delete shipment.');
                }
            } catch (err) {
                alert('Network error deleting shipment.');
            }
        }

        async function viewOrderDetails(orderId) {
            const modal = document.getElementById("orderModal");
            const modalBody = document.getElementById("modal-body");
            document.getElementById("modal-order-id").innerText = `#${orderId}`;
            modal.style.display = "block";
            modalBody.innerHTML = "Loading order details...";

            try {
                // Fetch from order-service
                const res = await fetch(`/api/orders/orders/detail/${orderId}/`);
                if (res.ok) {
                    const order = await res.json();
                    let itemsHtml = `
                        <p><strong>Total Price:</strong> $${order.total_price}</p>
                        <p><strong>Status:</strong> ${order.status}</p>
                        <h3>Items:</h3>
                        <div style="max-height: 300px; overflow-y: auto;">
                    `;
                    order.items.forEach(item => {
                        const bookName = booksMap[item.book_id] || `Unknown Book (ID: ${item.book_id})`;
                        itemsHtml += `
                            <div class="order-detail-item">
                                <span><strong>${bookName}</strong> (Qty: ${item.quantity})</span>
                                <strong>$${item.price}</strong>
                            </div>
                        `;
                    });
                    itemsHtml += `</div>`;
                    modalBody.innerHTML = itemsHtml;
                } else {
                    modalBody.innerHTML = "<p style='color:red;'>Failed to load order details (Order might be archived or deleted).</p>";
                }
            } catch (err) {
                modalBody.innerHTML = "<p style='color:red;'>Network error fetching details.</p>";
            }
        }

        function closeModal() {
            document.getElementById("orderModal").style.display = "none";
        }

        // Close modal if user clicks outside of it
        window.onclick = function(event) {
            const modal = document.getElementById("orderModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Initialize
        fetchBooksMap().then(() => fetchShippingList());

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/login/';
        });
    </script>
</body>
</html>
