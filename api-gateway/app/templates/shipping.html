<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shipping Status</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; text-align: center;}
        h2 { color: #333; margin-top: 0; color: #28a745; }
        p { font-size: 18px; color: #555; margin-bottom: 10px; }
        .status-box { padding: 20px; margin: 20px 0; border: 2px dashed #007bff; border-radius: 10px; background-color: #e9f5ff; }
        .status-text { font-size: 24px; font-weight: bold; color: #007bff; margin: 0; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; text-decoration: none; margin-top: 20px; transition: background 0.2s;}
        .btn:hover { background-color: #0056b3; }
        .error { color: #dc3545; font-weight: bold;}
    </style>
</head>
<body>
    <div class="header">
        <h1>BookStore Dashboard</h1>
        <div class="nav-links">
            <a href="/dashboard/">Dashboard</a>
            <a href="/view-books/">View Books</a>
            <a href="/add-book/">Add Book</a>
            <a href="/cart/">Cart</a>
            <a href="/shipping-list/">Shipping Orders</a>
        </div>
    </div>

    <div class="container" id="shipping-panel">
        <h2>Order Confirmed!</h2>
        <p>Thank you for your purchase.</p>
        
        <div class="status-box">
            <p style="margin-top:0;"><strong>Order #<span id="order-num">...</span></strong></p>
            <p>Will be delivered to: <br><strong id="ship-address">...</strong></p>
            <p class="status-text" id="ship-status">Loading Status...</p>
        </div>

        <a href="/dashboard/" class="btn">Continue Shopping</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        if (!orderId) {
            document.getElementById('shipping-panel').innerHTML = "<h2 class='error'>Invalid Order</h2><p>No order ID specified.</p><a href='/dashboard/' class='btn'>Go Back</a>";
        } else {
            document.getElementById('order-num').innerText = orderId;
            fetchShippingStatus();
        }

        async function fetchShippingStatus() {
            try {
                const res = await fetch(`http://localhost:8008/shipping/${orderId}/`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('ship-address').innerText = data.address;
                    document.getElementById('ship-status').innerText = data.status.toUpperCase();
                } else {
                    document.getElementById('ship-status').innerText = "STATUS UNKNOWN";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('ship-status').innerText = "NETWORK ERROR";
            }
        }
    </script>
</body>
</html>
