<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard - BookStore</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .nav-links a.active { background-color: #ff9800; color: white; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #ff9800; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .welcome { margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #ff9800; }
        .stat-card h3 { font-size: 16px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 42px; font-weight: bold; color: #333; }
        .stat-card.shipping { border-color: #03a9f4; }
        .stat-card.delivered { border-color: #4caf50; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span> [Staff]</h1>
        <div class="nav-links">
            <a href="/staff/dashboard/" class="active">Dashboard</a>
            <a href="/staff/view-books/">View Books</a>
            <a href="/staff/add-book/">Add Book</a>
            <a href="/staff/shipping-list/">Shipping Orders</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="welcome">
        <h2>Xin chào, <span id="username-display">Nhân viên</span>!</h2>
        <p>Hệ thống quản trị dành cho Staff. Theo dõi kho và vận chuyển.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Tổng số sản phẩm</h3>
            <div class="value" id="total-products">0</div>
        </div>
        <div class="stat-card shipping">
            <h3>Đang giao hàng</h3>
            <div class="value" id="shipping-count">0</div>
        </div>
        <div class="stat-card delivered">
            <h3>Giao thành công</h3>
            <div class="value" id="delivered-count">0</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/staff/login/';
        
        document.getElementById('username-display').textContent = localStorage.getItem('username') || 'Nhân viên';

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/staff/api/dashboard-data/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Unauthorized");
                const data = await res.json();
                
                document.getElementById('total-products').textContent = data.total_products;
                document.getElementById('shipping-count').textContent = data.shipping_count;
                document.getElementById('delivered-count').textContent = data.delivered_count;
            } catch(e) { 
                console.error(e);
                window.location.href = '/staff/login/';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/staff/login/';
        }

        loadDashboardData();
    </script>
</body>
</html>
