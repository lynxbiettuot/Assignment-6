<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sách - Staff View</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #333; font-weight: bold; padding: 8px 12px; border-radius: 5px; transition: background-color 0.2s;}
        .nav-links a:hover { background-color: #f0f0f0; }
        .header h1 { margin: 0; color: #333; }
        .header h1 span { color: #ff9800; }
        
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; margin-top: 50px;}
        .book-title { font-size: 28px; font-weight: bold; margin: 0 0 10px 0; color: #ff9800; }
        .book-author { color: #555; margin-bottom: 20px; font-size: 18px; }
        .book-detail { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .btn { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; cursor: pointer; border: none; font-size: 16px;}
        .notice { color: #856404; background-color: #fff3cd; padding: 10px; border-radius: 5px; border: 1px solid #ffeeba; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Book<span>Store</span> [Staff]</h1>
        <div class="nav-links">
            <a href="/staff/dashboard/">Dashboard</a>
            <a href="/staff/view-books/">View Books</a>
            <a href="/staff/add-book/">Add Book</a>
            <a href="/staff/shipping-list/">Shipping Orders</a>
            <a onclick="logout()" style="color: #ff5252; cursor: pointer; margin-left: 20px;">Logout</a>
        </div>
    </div>

    <div class="container" id="book-content">
        <h2>Đang tải...</h2>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/staff/login/';

        const bookId = {{ book_id }};

        async function fetchBookDetail() {
            try {
                const res = await fetch(`/api/catalog/catalog/books/${bookId}/`);
                if (res.ok) {
                    const book = await res.json();
                    renderBookDetail(book);
                }
            } catch (error) { console.error(error); }
        }

        function renderBookDetail(book) {
            const container = document.getElementById('book-content');
            const imageUrl = book.image ? `/api/books${book.image}` : 'https://via.placeholder.com/600x400';
            
            container.innerHTML = `
                <img src="${imageUrl}" style="width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 20px; border-radius: 10px;">
                <h1 class="book-title">${book.title}</h1>
                <div class="book-author">Tác giả: ${book.author}</div>
                <div class="book-detail"><strong>Giá:</strong> $${book.price}</div>
                <div class="notice">
                    <strong>Thông báo cho Staff:</strong> Chế độ xem chỉ đọc. Bạn không có quyền thêm vào giỏ hàng hoặc chỉnh sửa thông tin sách này.
                </div>
                <a href="/staff/view-books/" class="btn">Quay lại danh sách</a>
            `;
        }

        function logout() { localStorage.clear(); window.location.href = '/staff/login/'; }
        fetchBookDetail();
    </script>
</body>
</html>
