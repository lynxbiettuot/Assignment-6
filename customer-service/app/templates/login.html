<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – Customer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo h1 { font-size: 26px; color: #fff; font-weight: 700; }
        .logo span { color: #e94560; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
        label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 6px; margin-top: 16px; }
        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #e94560; background: rgba(255,255,255,0.12); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .error-box {
            background: rgba(233,69,96,0.15);
            border: 1px solid rgba(233,69,96,0.4);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #e94560; text-decoration: none; font-size: 14px; }
        .link a:hover { text-decoration: underline; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>📚 Book<span>Store</span></h1>
            <p>Đăng nhập tài khoản khách hàng</p>
        </div>

        <div id="error-box" class="error-box"></div>

        <form id="login-form">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập username..." required autocomplete="username">

            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">

            <button type="submit" class="btn" id="submit-btn">Đăng nhập</button>
        </form>

        <hr class="divider">
        <div class="link">
            <a href="/login/register/">Chưa có tài khoản? Đăng ký ngay</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorBox = document.getElementById('error-box');

            btn.textContent = 'Đang đăng nhập...';
            btn.disabled = true;
            errorBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('username', username);
                    window.location.href = '/dashboard/';
                } else {
                    errorBox.textContent = data.detail || 'Tên đăng nhập hoặc mật khẩu không đúng.';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Không thể kết nối server. Vui lòng thử lại.';
                errorBox.style.display = 'block';
            } finally {
                btn.textContent = 'Đăng nhập';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
